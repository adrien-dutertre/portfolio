<fieldset class="frame h-full w-full overflow-y-auto">
    <legend>
        <h2>Projets</h2>
    </legend>
    <ul>
        @for (project of projects(); track $index) {
        <li>
            <h3>{{ project.name }}</h3>
            <p>{{ project.description }}</p>
        </li>

        }
    </ul>

</fieldset>
